<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  {% include head.html %}
  {% include head-scripts.html %}
</head>
<body>
  <div id="progress-bar"></div>

  <a href="#main-content" class="skip-link" role="link" data-skip-link>Skip to main content</a>

  <button class="btn btn-primary sidebar-toggle" id="sidebar-toggle" aria-label="Toggle Sidebar" aria-controls="sidebar" aria-expanded="false">
    <span class="icon-bar top-bar"></span>
    <span class="icon-bar middle-bar"></span>
    <span class="icon-bar bottom-bar"></span>
  </button>

  <div class="page-wrapper">
    {% include sidebar.html %}

    <main id="main-content" class="main-content" role="main" tabindex="-1">
      <div class="container">
        {{ content }}

        <div id="mask"></div>
      </div>
    </main>

    {% include footer.html %}
  </div>

  <button type="button" id="scroll-top" class="btn btn-primary scroll-top" aria-label="Scroll to top" data-scroll-top>
   {% icon arrow-up %}
  </button>

  {% include scripts.html %}
</body>
</html>
