<section class="playground-container">
  <h1>🎨 CSS Animation Playground</h1>
  <p>Click any button below to trigger the animation effect in real time. You can reuse the same classes in your blog content.</p>

  <div class="playground-grid">
    <button onclick="triggerAnim(this, 'anim--fade-in')">Fade In</button>
    <button onclick="triggerAnim(this, 'anim--slide-up')">Slide Up</button>
    <button onclick="triggerAnim(this, 'anim--scale-up')">Scale Up</button>
    <button onclick="triggerAnim(this, 'anim--pulse')">Pulse</button>
    <button onclick="triggerAnim(this, 'anim--bounce')">Bounce</button>
    <button onclick="triggerAnim(this, 'anim--spin')">Spin</button>
  </div>
</section>

<script>
function triggerAnim(el, animClass) {
  el.classList.remove(animClass);
  void el.offsetWidth; // trigger reflow
  el.classList.add(animClass);
}
</script>

<style>
.playground-container {
  max-width: 700px;
  margin: 0 auto;
  padding: 2rem;
  text-align: center;
}

.playground-grid {
  display: grid;
  gap: 1rem;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  margin-top: 2rem;
}

button {
  padding: 0.75rem 1.25rem;
  font-size: 1rem;
  border: none;
  background-color: #3498db;
  color: white;
  cursor: pointer;
  border-radius: 0.5rem;
  transition: background-color 0.2s ease;
}

button:hover {
  background-color: #2c80b4;
}

.anim--fade-in {
  animation: fade-in 0.4s ease forwards;
}
@keyframes fade-in {
  from { opacity: 0; transform: translateY(0.5rem); }
  to { opacity: 1; transform: translateY(0); }
}

.anim--slide-up {
  animation: slide-up 0.5s ease forwards;
}
@keyframes slide-up {
  from { opacity: 0; transform: translateY(1rem); }
  to { opacity: 1; transform: translateY(0); }
}

.anim--scale-up {
  animation: scale-up 0.4s ease forwards;
}
@keyframes scale-up {
  from { transform: scale(0.95); opacity: 0.6; }
  to { transform: scale(1); opacity: 1; }
}

.anim--pulse {
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.05); opacity: 1; }
}

.anim--bounce {
  animation: bounce 1s cubic-bezier(.34, 1.56, .64, 1) infinite alternate;
}
@keyframes bounce {
  0% { transform: translateY(0); }
  100% { transform: translateY(-1rem); }
}

.anim--spin {
  animation: spin 1s linear infinite;
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
