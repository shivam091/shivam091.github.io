name: Deploy Blog to GitHub Pages

on:
  push:
    branches: [ "main", "staging" ] # Triggers on push to either branch
  schedule:
    - cron: '0 0 * * *'             # Runs automatically every day at midnight UTC
  workflow_dispatch:                # Enables manual trigger button in GitHub Actions UI

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v5

      - name: Setup Node.js Environment
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}

      - name: Setup GitHub Pages Config
        uses: actions/configure-pages@v5

      - name: Install Project Dependencies
        run: npm ci

      - name: Production Static Build
        run: npm run build

      - name: Upload Static Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out # Uploads the static folder generated by Next.js

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Artifact to Live Server
        id: deployment
        uses: actions/deploy-pages@v5
