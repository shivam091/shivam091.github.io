name: CI & Deploy to Vercel

on:
  push:
    branches: ["main", "staging"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "deploy-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # ── Lint & type-check ────────────────────────────────────────────────────────
  ci:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  # ── Deploy to Vercel (main branch only) ──────────────────────────────────────
  # Prerequisites — add these as GitHub repository secrets:
  #   VERCEL_TOKEN      → Vercel account token (vercel.com → Settings → Tokens)
  #   VERCEL_ORG_ID     → from .vercel/project.json after running `npx vercel link`
  #   VERCEL_PROJECT_ID → from .vercel/project.json after running `npx vercel link`
  #
  # Also add these as Vercel Environment Variables (Production):
  #   MONGODB_URI, MONGODB_DB, RECAPTCHA_SECRET_KEY, NEXT_PUBLIC_RECAPTCHA_SITE_KEY
  deploy:
    name: Deploy to Vercel
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(npx vercel --prod \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --yes \
            2>&1 | tail -1)
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
