<div class="code-block-wrapper">
  <div class="code-block-header">
    <div class="dots">
      <span></span><span></span><span></span>
    </div>
    <div class="language">{{ language | upcase }}</div>
    <div class="copy-button" onclick="copyToClipboard(this)">Copy</div>
  </div>
  <div class="highlight">
    {{ code }}
  </div>
</div>
