{% assign post = include.post %}

<div class="post-meta">
  <div class="post-date">
    <svg role="img" aria-hidden="true"><use xlink:href="#icon-calendar"></use></svg>
    <strong class="visually-hidden">Published at:</strong>
    {% include datetime.html date = post.date %}
  </div>

  {% if post.tags %}
    <div class="post-tags">
      <svg role="img" aria-hidden="true"><use xlink:href="#icon-tag"></use></svg>
      <strong class="visually-hidden">Tags:</strong>
      {% for tag in post.tags %}
        <a href="/tag{{ tag | slugify | relative_url }}" class="badge">{{ tag }}</a>
      {% endfor %}
    </div>
  {% endif %}

  {% if post.categories %}
    <div class="post-categories">
      <svg role="img" aria-hidden="true"><use xlink:href="#icon-folder-open"></use></svg>
      <strong class="visually-hidden">Categories:</strong>
      {% for category in post.categories %}
        <a href="/category{{ category | slugify | relative_url }}" class="badge">{{ category }}</a>
      {% endfor %}
    </div>
  {% endif %}
</div>
